<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login | FranxAI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.3.2/jsencrypt.min.js"></script>
    <style>
        /* Reset styles | 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #333;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: #5a67d8;
        }

        .error {
            color: #e53e3e;
            margin-top: 12px;
            font-size: 14px;
        }

        .info {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        a {
            color: #667eea;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Make the register link animate properly | 使注册链接能正确动画 */
        #registerLink {
            display: inline-block;
        }

        /* Animation overlay | 动画覆盖层 */
        .expand-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .expand-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Checkbox container and shake animation | 勾选框容器及抖动动画 */
        .agree-container {
            margin: 15px 0 5px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #444;
        }
        .agree-container input {
            width: 18px;
            height: 18px;
            margin: 0;
            flex-shrink: 0;
        }
        .agree-container label {
            cursor: pointer;
        }
        .shake {
            animation: shake 0.3s ease-in-out 0s 2;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }
        .agree-error {
            color: #e53e3e;
            font-size: 0.8rem;
            margin-top: 5px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🤖 FranxAI Chat Assistant</h1>
        <div class="subtitle">FranxAI 聊天助手</div>
        <input type="password" id="password" placeholder="Password | 密码" autocomplete="current-password">
        
        <!-- Agreement checkbox | 同意勾选框 -->
        <div class="agree-container" id="agreeContainer">
            <input type="checkbox" id="agreeCheckbox">
            <label for="agreeCheckbox">
                I have read and agree to the <a href="https://github.com/xhdlphzr/FranxAI/blob/main/README.md" target="_blank">User Guide and Disclaimer</a> | 
                我已阅读并同意 <a href="https://github.com/xhdlphzr/FranxAI/blob/main/README_zh.md" target="_blank">《使用说明和免责声明》</a>
            </label>
        </div>
        <div id="agreeError" class="agree-error" style="display: none;">Please check the checkbox | 请勾选勾选框</div>
        
        <button id="loginBtn">Login | 登录</button>
        <div id="errorMsg" class="error"></div>
        <div class="info">
            <a href="/register" id="registerLink">No password? Set up now | 没有密码？立即设置</a>
        </div>
    </div>

    <script>
        // DOM elements | DOM 元素
        const loginBtn = document.getElementById('loginBtn');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMsg');
        const agreeCheckbox = document.getElementById('agreeCheckbox');
        const agreeContainer = document.getElementById('agreeContainer');
        const agreeError = document.getElementById('agreeError');
        const registerLink = document.getElementById('registerLink');

        // Create overlay element | 创建覆盖层元素
        const overlay = document.createElement('div');
        overlay.className = 'expand-overlay';
        document.body.appendChild(overlay);

        // Fetch RSA public key from server | 从服务器获取 RSA 公钥
        async function fetchPublicKey() {
            const resp = await fetch('/api/public-key');
            const data = await resp.json();
            return data.public_key;
        }

        // Perform the actual login request | 执行实际的登录请求
        async function performLogin() {
            const password = passwordInput.value.trim();
            try {
                const publicKeyPem = await fetchPublicKey();
                const encrypt = new JSEncrypt();
                encrypt.setKey(publicKeyPem);
                const encrypted = encrypt.encrypt(password);
                if (!encrypted) {
                    throw new Error('Encryption failed | 加密失败');
                }

                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: encrypted })
                });
                const result = await resp.json();
                if (resp.ok) {
                    // Store token temporarily (will be consumed by index.html) | 临时存储 token（将被 index.html 消费）
                    localStorage.setItem('franxai_temp_token', result.token);
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = result.error || 'Login failed | 登录失败';
                    overlay.classList.remove('active');
                }
            } catch (err) {
                errorMsg.textContent = 'Network error | 网络错误';
                console.error(err);
                overlay.classList.remove('active');
            }
        }

        // Validate checkbox before login animation | 登录前验证勾选框
        function validateAgreement() {
            if (!agreeCheckbox.checked) {
                // Shake the agreement container and show error | 抖动勾选框容器并显示错误
                agreeContainer.classList.add('shake');
                agreeError.style.display = 'block';
                setTimeout(() => {
                    agreeContainer.classList.remove('shake');
                }, 300);
                return false;
            } else {
                agreeError.style.display = 'none';
                return true;
            }
        }

        // Login with animation | 带动画的登录入口
        async function login() {
            // First validate agreement | 首先验证同意勾选
            if (!validateAgreement()) {
                return;
            }

            // Check if password has been set (avoid animation if not) | 检查是否已设置密码（若未设置则跳过动画）
            try {
                const checkResp = await fetch('/api/check-auth');
                const checkData = await checkResp.json();
                if (!checkData.password_set) {
                    // Password not set: shake the register link and show error message | 密码未设置：抖动注册链接并显示错误信息
                    if (registerLink) {
                        registerLink.classList.add('shake');
                        setTimeout(() => registerLink.classList.remove('shake'), 300);
                    }
                    errorMsg.textContent = 'Password not set. Please register first. | 密码未设置，请先注册。';
                    return; // Do not proceed to animation or login | 不执行后续动画和登录
                }
            } catch (err) {
                // If the check fails, continue anyway (assume password set) | 如果检查失败，仍然继续（假设密码已设置）
                console.error('Failed to check password status', err);
            }

            const password = passwordInput.value.trim();
            if (!password) {
                errorMsg.textContent = 'Please enter password | 请输入密码';
                return;
            }

            // Start animation: button expands to full screen | 开始动画：按钮放大至全屏
            const btn = loginBtn;
            const rect = btn.getBoundingClientRect();
            const clone = btn.cloneNode(true);
            clone.style.position = 'fixed';
            clone.style.top = rect.top + 'px';
            clone.style.left = rect.left + 'px';
            clone.style.width = rect.width + 'px';
            clone.style.height = rect.height + 'px';
            clone.style.margin = '0';
            clone.style.zIndex = '10000';
            clone.style.transition = 'all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
            clone.style.backgroundColor = getComputedStyle(btn).backgroundColor;
            clone.style.borderRadius = getComputedStyle(btn).borderRadius;
            document.body.appendChild(clone);

            // Force reflow | 强制重绘
            clone.offsetHeight;
            clone.style.top = '0';
            clone.style.left = '0';
            clone.style.width = '100%';
            clone.style.height = '100%';
            clone.style.borderRadius = '0';
            clone.style.backgroundColor = '#ffffff';

            overlay.classList.add('active');

            // Wait for animation to finish, then perform actual login | 等待动画完成，再执行登录
            setTimeout(() => {
                clone.remove();
                performLogin();
            }, 300);
        }

        // Event listeners | 事件监听
        loginBtn.addEventListener('click', login);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        // When checkbox changes, hide error if checked | 当勾选框变化时，如果勾选则隐藏错误
        agreeCheckbox.addEventListener('change', () => {
            if (agreeCheckbox.checked) {
                agreeError.style.display = 'none';
            }
        });
    </script>
</body>
</html>
