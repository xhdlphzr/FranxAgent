<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Register | FranxAgent</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.3.2/jsencrypt.min.js"></script>
    <link rel="stylesheet" href="/static/css/register.css">
</head>
<body>
    <div class="register-container">
        <h1>🤖 FranxAgent</h1>
        <input type="password" id="password" autocomplete="new-password">
        <input type="password" id="confirmPassword" autocomplete="new-password">
        
        <!-- Agreement checkbox -->
        <div class="agree-container" id="agreeContainer">
            <input type="checkbox" id="agreeCheckbox">
            <label for="agreeCheckbox" id="agreeLabel"></label>
        </div>
        <div id="agreeError" class="agree-error" style="display: none;"></div>
        
        <button id="registerBtn"></button>
        <div id="errorMsg" class="error"></div>
        <div class="info">
            <a href="/login" id="loginLink"></a>
        </div>
    </div>

    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/register.js"></script>
</body>
</html>
