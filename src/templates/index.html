<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyMate 聊天助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            color: #1e1e1e;
        }

        .container {
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 200px;
            background: #fff;
            border-right: 1px solid #ddd;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .nav-btn {
            background: none;
            border: none;
            padding: 12px 20px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        .nav-btn:hover {
            background: #e9ecef;
        }
        .nav-btn.active {
            background: #e9ecef;
            font-weight: bold;
            border-left: 3px solid #1e90ff;
        }

        .page {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
            background: #fff;
        }
        .page.active {
            display: flex;
        }

        .page-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e9ecef;
            background: #fff;
            flex-shrink: 0;
        }
        .page-header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e1e1e;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .message.user {
            background-color: #e6f3e6;
            align-self: flex-end;
            text-align: right;
        }
        .message.assistant {
            background-color: #ffffff;
            border: 1px solid #ddd;
            align-self: flex-start;
            text-align: left;
        }
        .message.temp {
            opacity: 0.7;
            font-style: italic;
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
            background: #fff;
        }
        .chat-input-area textarea {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 20px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
        }
        .chat-input-area button {
            padding: 0 20px;
            background: #1e90ff;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .chat-input-area button:hover {
            background: #0c7bdc;
        }

        #console-details {
            margin: 0 16px 16px 16px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        #console-details summary {
            padding: 8px 12px;
            cursor: pointer;
            font-weight: bold;
            background: #f1f3f5;
            border-radius: 8px 8px 0 0;
        }
        #console-output {
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            background: #fff;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #ddd;
        }

        #config-page {
            overflow-y: auto;
        }
        #config-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 500px;
            margin: 20px;
        }
        #config-form label {
            font-weight: bold;
            margin-top: 8px;
        }
        #config-form input, #config-form textarea {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: inherit;
        }
        #config-form button {
            margin-top: 16px;
            padding: 10px;
            background: #1e90ff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #config-form button:hover {
            background: #0c7bdc;
        }
        #config-status {
            margin: 20px;
            color: green;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <button class="nav-btn active" data-page="chat">💬 聊天</button>
            <button class="nav-btn" data-page="config">⚙️ 配置</button>
        </div>

        <div id="chat-page" class="page active">
            <div class="page-header">
                <h2>🤖 EasyMate 聊天助手</h2>
            </div>
            <div id="chat-messages" class="chat-messages"></div>
            <div class="chat-input-area">
                <textarea id="message-input" rows="3" placeholder="输入你的指令... 按 Ctrl+Enter 发送"></textarea>
                <button id="send-btn">发送</button>
            </div>
            <details id="console-details">
                <summary>📋 控制台输出</summary>
                <pre id="console-output"></pre>
            </details>
        </div>

        <div id="config-page" class="page">
            <div class="page-header">
                <h2>⚙️ 配置</h2>
            </div>
            <form id="config-form">
                <label>API密钥</label>
                <input type="text" id="api_key" name="api_key">
                <label>接口地址</label>
                <input type="text" id="base_url" name="base_url">
                <label>模型名称</label>
                <input type="text" id="model" name="model">
                <label>系统设置</label>
                <textarea id="settings" name="settings" rows="6"></textarea>
                <button type="submit">保存配置</button>
            </form>
            <div id="config-status"></div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const consoleOutput = document.getElementById('console-output');
        const consoleDetails = document.getElementById('console-details');
        const navBtns = document.querySelectorAll('.nav-btn');
        const chatPage = document.getElementById('chat-page');
        const configPage = document.getElementById('config-page');
        const configForm = document.getElementById('config-form');
        const configStatus = document.getElementById('config-status');

        navBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const page = btn.dataset.page;
                if (page === 'chat') {
                    chatPage.classList.add('active');
                    configPage.classList.remove('active');
                } else {
                    chatPage.classList.remove('active');
                    configPage.classList.add('active');
                    loadConfig();
                }
                navBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        async function loadConfig() {
            try {
                const resp = await fetch('/config');
                const config = await resp.json();
                if (config.error) {
                    configStatus.innerText = '加载配置失败: ' + config.error;
                } else {
                    document.getElementById('api_key').value = config.api_key || '';
                    document.getElementById('base_url').value = config.base_url || '';
                    document.getElementById('model').value = config.model || '';
                    document.getElementById('settings').value = config.settings || '';
                    configStatus.innerText = '';
                }
            } catch (err) {
                configStatus.innerText = '加载配置失败: ' + err.message;
            }
        }

        configForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newConfig = {
                api_key: document.getElementById('api_key').value,
                base_url: document.getElementById('base_url').value,
                model: document.getElementById('model').value,
                settings: document.getElementById('settings').value
            };
            try {
                const resp = await fetch('/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newConfig)
                });
                const result = await resp.json();
                if (result.status === 'success') {
                    configStatus.innerText = '配置已保存，已生效！';
                } else {
                    configStatus.innerText = '保存失败: ' + result.error;
                }
            } catch (err) {
                configStatus.innerText = '保存失败: ' + err.message;
            }
        });

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            messageInput.value = '';
            addMessage('user', message);
            const assistantMsgDiv = addMessage('assistant', '思考中...', true);
            consoleOutput.textContent = '';
            try {
                const resp = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await resp.json();
                if (data.error) {
                    updateMessage(assistantMsgDiv, '错误: ' + data.error);
                } else {
                    updateMessage(assistantMsgDiv, data.answer);
                    if (data.logs && data.logs.trim()) {
                        consoleOutput.textContent = data.logs;
                        consoleDetails.open = true;
                    }
                }
            } catch (err) {
                updateMessage(assistantMsgDiv, '网络错误: ' + err.message);
            }
        }

        function addMessage(role, content, temporary = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            if (temporary) {
                msgDiv.classList.add('temp');
            }
            msgDiv.textContent = content;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msgDiv;
        }

        function updateMessage(msgDiv, content) {
            msgDiv.textContent = content;
            msgDiv.classList.remove('temp');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        loadConfig();
    </script>
</body>
</html>
